<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Niyyah ✦</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════
   THEME : DARK (default)
══════════════════════════ */
:root {
  --bg:        #03030a;
  --bg1:       #080810;
  --bg2:       #0f0f17;
  --card:      rgba(28,28,42,0.95);
  --card2:     rgba(44,44,62,0.90);
  --sep:       rgba(255,255,255,0.07);
  --sep2:      rgba(255,255,255,0.12);

  --t1:  #ffffff;
  --t2:  rgba(255,255,255,0.55);
  --t3:  rgba(255,255,255,0.28);

  --header-bg: rgba(3,3,10,0.80);
  --nav-bg:    rgba(3,3,10,0.88);

  --green:      #34d962;
  --green-dim:  #1a6632;
  --green-glow: rgba(52,217,98,0.22);
  --green-soft: rgba(52,217,98,0.10);
  --green-grad: linear-gradient(135deg,#34d962 0%,#26b850 100%);

  --gold:      #ffd60a;
  --gold-soft: rgba(255,214,10,0.10);
  --gold-glow: rgba(255,214,10,0.28);
  --gold-grad: linear-gradient(135deg,#ffd60a 0%,#f5a623 100%);

  --bronze:    #e09a52;
  --silver:    #b8ccd6;

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);

  --r:    14px;
  --r-lg: 20px;
  --r-xl: 28px;

  --serif: 'DM Serif Display', Georgia, serif;
  --sans:  'DM Sans', -apple-system, sans-serif;
  --calli: 'Cormorant Garamond', 'Palatino Linotype', Georgia, serif;

  --theme-icon: '☀\FE0F';
}

/* ══════════════════════════
   THEME : LIGHT — FIXED
══════════════════════════ */
[data-theme="light"] {
  --bg:        #f0f0f5;
  --bg1:       #e4e4eb;
  --bg2:       #ffffff;
  --card:      #ffffff;
  --card2:     #ebebf0;
  --sep:       rgba(0,0,0,0.09);
  --sep2:      rgba(0,0,0,0.15);

  --t1:  #000000;
  --t2:  rgba(0,0,0,0.60);
  --t3:  rgba(0,0,0,0.40);

  --header-bg: rgba(240,240,245,0.92);
  --nav-bg:    rgba(240,240,245,0.95);

  --green:      #1a9436;
  --green-dim:  #d0f0d8;
  --green-glow: rgba(26,148,54,0.18);
  --green-soft: rgba(26,148,54,0.10);
  --green-grad: linear-gradient(135deg,#1a9436 0%,#148030 100%);

  --gold:      #a07000;
  --gold-soft: rgba(160,112,0,0.10);
  --gold-glow: rgba(160,112,0,0.20);
  --gold-grad: linear-gradient(135deg,#c48800 0%,#a06000 100%);

  --bronze:    #8b5e1a;
  --silver:    #4a6e80;
}

[data-theme="light"] .header,
[data-theme="light"] .tabs-wrap {
  background: var(--header-bg) !important;
  border-bottom: 1px solid var(--sep);
}
[data-theme="light"] .nav-bar {
  background: var(--nav-bg) !important;
}

/* Cards — ombre visible, fond blanc net */
[data-theme="light"] .items-group {
  background: #ffffff !important;
  border: 1px solid rgba(0,0,0,0.07) !important;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05) !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
}
[data-theme="light"] .level-hero {
  background: linear-gradient(145deg,#ffffff 0%,#f5f5fa 100%) !important;
  border: 1px solid rgba(0,0,0,0.07) !important;
  box-shadow: 0 2px 16px rgba(0,0,0,0.08) !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
}
[data-theme="light"] .streak-card,
[data-theme="light"] .stat-box,
[data-theme="light"] .year-card,
[data-theme="light"] .badge-card,
[data-theme="light"] .resume-hero,
[data-theme="light"] .resume-level-row {
  background: #ffffff !important;
  border: 1px solid rgba(0,0,0,0.07) !important;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08) !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
}

/* Texte — noir net */
[data-theme="light"] .item-label  { color: #000000 !important; }
[data-theme="light"] .item-sub    { color: rgba(0,0,0,0.50) !important; }
[data-theme="light"] .item.checked .item-label { color: rgba(0,0,0,0.30) !important; }

/* Arabe — vert foncé lisible */
[data-theme="light"] .item-arabic { color: var(--green) !important; opacity: 1 !important; }
[data-theme="light"] .item.checked .item-arabic { opacity: 0.30 !important; }

/* Hero title visible */
[data-theme="light"] .hero-title   { color: #000000 !important; }
[data-theme="light"] .hero-label   { color: var(--green) !important; }
[data-theme="light"] .hero-pct     { color: var(--green) !important; }

/* Section */
[data-theme="light"] .section-name { color: rgba(0,0,0,0.55) !important; }
[data-theme="light"] .section-icon-wrap { background: var(--green-soft) !important; }

/* Tabs */
[data-theme="light"] .tab {
  background: #ffffff !important;
  color: rgba(0,0,0,0.55) !important;
  border-color: rgba(0,0,0,0.10) !important;
}
[data-theme="light"] .tab.done:not(.active) {
  color: var(--green) !important;
  border-color: rgba(26,148,54,0.3) !important;
}

/* Counter */
[data-theme="light"] .counter-body  { background: #f0f0f5 !important; }
[data-theme="light"] .counter-num   { color: #000000 !important; }
[data-theme="light"] .counter-total { color: rgba(0,0,0,0.40) !important; }
[data-theme="light"] .counter-item.checked .counter-num { color: var(--green) !important; }
[data-theme="light"] .btn-cnt-reset {
  background: #e8e8ee !important;
  border-color: rgba(0,0,0,0.12) !important;
  color: rgba(0,0,0,0.55) !important;
}

/* Streak */
[data-theme="light"] .streak-num   { color: #000000 !important; }
[data-theme="light"] .streak-label { color: rgba(0,0,0,0.40) !important; }
[data-theme="light"] .streak-unit  { color: rgba(0,0,0,0.55) !important; }
[data-theme="light"] .streak-footer { color: rgba(0,0,0,0.40) !important; border-top-color: rgba(0,0,0,0.09) !important; }
[data-theme="light"] .streak-footer span { color: rgba(0,0,0,0.70) !important; }
[data-theme="light"] .streak-card::before {
  background: linear-gradient(90deg, transparent, var(--green), transparent);
  opacity: 0.4;
}

/* Medal tag */
[data-theme="light"] .medal-tag.none   { background: #ebebf0 !important; color: rgba(0,0,0,0.40) !important; }
[data-theme="light"] .medal-tag.bronze { background: rgba(139,94,26,0.12) !important; color: var(--bronze) !important; }
[data-theme="light"] .medal-tag.silver { background: rgba(74,110,128,0.12) !important; color: var(--silver) !important; }
[data-theme="light"] .medal-tag.gold   { background: rgba(160,112,0,0.10) !important; color: var(--gold) !important; }

/* Date badge */
[data-theme="light"] .date-badge { color: rgba(0,0,0,0.55) !important; }
[data-theme="light"] .wordmark-sub { color: rgba(0,0,0,0.35) !important; }
[data-theme="light"] .wordmark-main { color: #000000 !important; }

/* Separators */
[data-theme="light"] .item:not(:last-child)::after { background: rgba(0,0,0,0.07) !important; }

/* Buttons */
[data-theme="light"] .btn-reset {
  background: #ffffff !important;
  border-color: rgba(0,0,0,0.15) !important;
  color: rgba(0,0,0,0.60) !important;
}
[data-theme="light"] .btn-stay-lvl {
  border-color: rgba(0,0,0,0.15) !important;
  color: rgba(0,0,0,0.55) !important;
}
[data-theme="light"] .btn-back-check {
  border-color: rgba(0,0,0,0.15) !important;
  color: rgba(0,0,0,0.55) !important;
}
[data-theme="light"] .btn-share {
  background: #ffffff !important;
  border-color: rgba(0,0,0,0.12) !important;
  color: rgba(0,0,0,0.55) !important;
}

/* Toast */
[data-theme="light"] .toast {
  background: rgba(255,255,255,0.97) !important;
  color: #000000 !important;
  border-color: rgba(0,0,0,0.12) !important;
  box-shadow: 0 4px 24px rgba(0,0,0,0.15) !important;
}

/* Popups */
[data-theme="light"] .level-popup-card,
[data-theme="light"] .badge-popup-card {
  background: #ffffff !important;
  border-color: rgba(0,0,0,0.08) !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
}
[data-theme="light"] .badge-popup,
[data-theme="light"] .level-popup { background: rgba(0,0,0,0.40) !important; }
[data-theme="light"] .lvl-title,
[data-theme="light"] .popup-title { color: #000000 !important; }
[data-theme="light"] .popup-sub,
[data-theme="light"] .lvl-sub    { color: rgba(0,0,0,0.60) !important; }

/* Lock screen */
[data-theme="light"] .lock-ring  { background: #ffffff !important; border-color: rgba(0,0,0,0.10) !important; }
[data-theme="light"] .lock-title { color: #000000 !important; }
[data-theme="light"] .lock-sub   { color: rgba(0,0,0,0.55) !important; }

/* Section label */
[data-theme="light"] .section-label { color: #000000 !important; }

/* Year cal */
[data-theme="light"] .year-day   { background: #e0e0e8 !important; }
[data-theme="light"] .year-month-label { color: rgba(0,0,0,0.40) !important; }
[data-theme="light"] .year-nav-title   { color: #000000 !important; }
[data-theme="light"] .year-nav-btn     { background: #ebebf0 !important; border-color: rgba(0,0,0,0.10) !important; color: rgba(0,0,0,0.60) !important; }
[data-theme="light"] .yl-item          { color: rgba(0,0,0,0.45) !important; }

/* Week strip */
[data-theme="light"] .day-cell         { background: #ffffff !important; border-color: rgba(0,0,0,0.09) !important; }
[data-theme="light"] .d-name           { color: rgba(0,0,0,0.40) !important; }
[data-theme="light"] .d-num            { color: rgba(0,0,0,0.40) !important; }

/* Nav */
[data-theme="light"] .nav-icon-wrap    { color: rgba(0,0,0,0.35) !important; }
[data-theme="light"] .nav-label        { color: rgba(0,0,0,0.35) !important; }
[data-theme="light"] .nav-item.active .nav-icon-wrap { color: var(--green) !important; }
[data-theme="light"] .nav-item.active .nav-label     { color: var(--green) !important; }

/* Badge cards */
[data-theme="light"] .badge-name { color: #000000 !important; }
[data-theme="light"] .badge-desc { color: rgba(0,0,0,0.45) !important; }
[data-theme="light"] .badge-card.locked { opacity: 0.35 !important; }

/* Friday banner */
[data-theme="light"] .friday-title { color: var(--gold) !important; }
[data-theme="light"] .friday-sub   { color: rgba(0,0,0,0.45) !important; }

/* Ambient off */
[data-theme="light"] body::before { opacity: 0; }

/* Smooth theme transition */
*, *::before, *::after {
  transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease;
}
/* But NOT on interactive elements or transforms */
.item, .btn-cnt, .check-circle, .tab, .medal-tag, .nav-item, .nav-icon-wrap,
.header-progress-fill, .hero-bar-fill, .counter-bar-fill,
.badge-popup, .level-popup, .badge-popup-card, .level-popup-card,
.year-day, .fast-day, .day-cell, .laylatul-night {
  transition: none;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--t1);
  font-family: var(--sans);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  transition: background-color 0.3s ease;
}

/* Ambient background glow — dark mode only */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 35% at 50% -5%, rgba(52,217,98,0.055) 0%, transparent 70%),
    radial-gradient(ellipse 50% 25% at 95% 65%, rgba(255,214,10,0.035) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
  transition: opacity 0.4s ease;
}
[data-theme="light"] body::before { opacity: 0; }

/* ── VIEWS ── */
.view { display: none; }
.view.active { display: block; }

/* ══════════════════════════
   HEADER
══════════════════════════ */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: calc(var(--safe-top) + 16px) 20px 0;
  background: var(--header-bg);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.wordmark {
  display: flex;
  flex-direction: column;
  gap: 0px;
}

.wordmark-main {
  font-family: var(--calli);
  font-size: 30px;
  font-weight: 300;
  font-style: italic;
  color: var(--t1);
  letter-spacing: 0.5px;
  line-height: 1;
  position: relative;
  display: inline-block;
}

/* Ligne décorative sous Niyyah */
.wordmark-main::after {
  content: '';
  position: absolute;
  bottom: -3px;
  left: 0;
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, var(--green), transparent);
  opacity: 0.5;
}

.wordmark-main span {
  background: var(--green-grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-style: normal;
  font-size: 18px;
  vertical-align: middle;
  margin-left: 2px;
}

.wordmark-sub {
  font-size: 9px;
  font-weight: 500;
  color: var(--t3);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 2px;
  font-family: var(--sans);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.date-badge {
  font-size: 11px;
  font-weight: 500;
  color: var(--t2);
  letter-spacing: 0.2px;
}

.medal-tag {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.medal-tag.none   { background: var(--card2); color: var(--t3); }
.medal-tag.bronze { background: rgba(212,145,74,0.18); color: var(--bronze); }
.medal-tag.silver { background: rgba(176,196,206,0.15); color: var(--silver); }
.medal-tag.gold   { background: var(--gold-soft); color: var(--gold); box-shadow: 0 0 12px var(--gold-glow); }
@keyframes tagPop { 0%{transform:scale(0.5);opacity:0} 65%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
.medal-tag.anim { animation: tagPop 0.45s cubic-bezier(0.34,1.56,0.64,1) both; }

/* Theme toggle button */
.btn-theme {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1px solid var(--sep2);
  background: var(--card);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), background 0.25s ease, border-color 0.25s ease;
  -webkit-tap-highlight-color: transparent;
}
.btn-theme:active { transform: scale(0.85) rotate(20deg); }

/* Global progress */
.header-progress {
  height: 2px;
  background: var(--sep2);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 0;
}
.header-progress-fill {
  height: 100%;
  background: var(--green-grad);
  border-radius: 2px;
  transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 0 8px var(--green-glow);
  position: relative; overflow: hidden;
}
.header-progress-fill::after {
  content: '';
  position: absolute;
  top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: barShimmer 2.5s ease-in-out infinite;
}

/* ══════════════════════════
   LEVEL TABS
══════════════════════════ */
.tabs-wrap {
  background: var(--header-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 12px 20px 10px;
  position: sticky;
  top: calc(var(--safe-top) + 68px);
  z-index: 99;
}

.tabs {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--t2);
  background: var(--card);
  border: 1px solid var(--sep);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  font-family: var(--sans);
}
.tab.active {
  background: var(--green-grad);
  color: #000;
  border-color: var(--green);
  font-weight: 600;
  box-shadow: 0 2px 12px rgba(52,217,98,0.30);
}
.tab.locked { opacity: 0.28; cursor: not-allowed; }
.tab.done:not(.active) { color: var(--green); border-color: rgba(48,209,88,0.3); }

/* ══════════════════════════
   CONTENT
══════════════════════════ */
.content {
  padding: 16px 16px 160px;
}

/* Level hero — glassmorphism premium */
.level-hero {
  background: linear-gradient(145deg, rgba(34,34,50,0.9) 0%, rgba(20,20,32,0.95) 100%);
  border-radius: var(--r-xl);
  padding: 20px;
  margin-bottom: 8px;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
}

.level-hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(52,217,98,0.5) 50%, transparent 100%);
}

.level-hero::after {
  content: '';
  position: absolute;
  right: -20px; top: -20px;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(52,217,98,0.12) 0%, transparent 70%);
  pointer-events: none;
  animation: heroGlow 4s ease-in-out infinite;
}
@keyframes heroGlow {
  0%,100% { opacity: 0.7; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.15); }
}

.hero-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--green);
  margin-bottom: 4px;
  opacity: 0.8;
}

.hero-title {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 400;
  color: var(--t1);
  letter-spacing: -0.3px;
  margin-bottom: 14px;
}

.hero-bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.hero-bar-track {
  flex: 1;
  height: 4px;
  background: var(--sep2);
  border-radius: 4px;
  overflow: hidden;
}

.hero-bar-fill {
  height: 100%;
  background: var(--green-grad);
  border-radius: 4px;
  transition: width 0.65s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 0 10px var(--green-glow), 0 0 20px rgba(52,217,98,0.12);
  position: relative;
  overflow: hidden;
}
.hero-bar-fill::after {
  content: '';
  position: absolute;
  top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: barShimmer 2.5s ease-in-out infinite;
}
@keyframes barShimmer {
  0%   { left: -100%; }
  100% { left: 200%; }
}

.hero-pct {
  font-size: 13px;
  font-weight: 600;
  color: var(--green);
  min-width: 36px;
  text-align: right;
}

/* Friday banner */
.friday-banner {
  background: linear-gradient(135deg, rgba(255,214,10,0.1), rgba(48,209,88,0.06));
  border: 1px solid rgba(255,214,10,0.2);
  border-radius: var(--r-lg);
  padding: 12px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.friday-txt { flex: 1; }
.friday-title { font-size: 13px; font-weight: 600; color: var(--gold); }
.friday-sub   { font-size: 11px; color: var(--t3); margin-top: 2px; }

/* ══════════════════════════
   SECTION
══════════════════════════ */
.section { margin-bottom: 2px; }

.section-title-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 16px 4px 8px;
}

.section-icon-wrap {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: var(--green-soft);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.section-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--t2);
  letter-spacing: 0.2px;
}

/* ══════════════════════════
   ITEM — iOS grouped style
══════════════════════════ */
.items-group {
  background: linear-gradient(160deg, rgba(28,28,42,0.92) 0%, rgba(22,22,34,0.96) 100%);
  border-radius: var(--r-lg);
  overflow: hidden;
  margin-bottom: 8px;
  border: 1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
}

/* ── STAGGER ENTRANCE ── */
@keyframes staggerIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.items-group .item {
  animation: staggerIn 0.3s ease both;
}

/* ── RIPPLE ── */
.item {
  position: relative;
  overflow: hidden;
}
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(52,217,98,0.18);
  transform: scale(0);
  animation: rippleAnim 0.55s ease-out forwards;
  pointer-events: none;
}
@keyframes rippleAnim {
  to { transform: scale(4); opacity: 0; }
}

.item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  position: relative;
  cursor: pointer;
  transition: background 0.15s;
  -webkit-user-select: none;
  user-select: none;
}

.item:not(:last-child)::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 54px;
  right: 0;
  height: 1px;
  background: var(--sep);
}

.item:active { background: rgba(255,255,255,0.04); }

/* Check circle — iOS style */
.check-circle {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 2px solid var(--sep2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  background: transparent;
}

.item.checked .check-circle {
  background: var(--green-grad);
  border-color: var(--green);
  box-shadow: 0 0 0 4px var(--green-soft), 0 0 16px rgba(52,217,98,0.25);
  transform: scale(1.08);
}

.check-svg {
  opacity: 0;
  transform: scale(0.3);
  transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.item.checked .check-svg { opacity: 1; transform: scale(1); }

.item-body { flex: 1; min-width: 0; }

.item-label {
  font-size: 15px;
  font-weight: 400;
  color: var(--t1);
  line-height: 1.3;
  transition: color 0.2s;
}

.item.checked .item-label {
  color: var(--t3);
  text-decoration: line-through;
  text-decoration-color: rgba(255,255,255,0.2);
}

.item-sub {
  font-size: 12px;
  color: var(--t3);
  margin-top: 2px;
  line-height: 1.35;
  white-space: normal;
}

/* Friday special item */
.item.friday-item .check-circle { border-color: rgba(255,214,10,0.4); }
.item.friday-item.checked .check-circle { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 0 4px var(--gold-soft); }
.item.friday-item .item-label { color: var(--gold); }
.item.friday-item.checked .item-label { color: var(--t3); }

/* Celebrate */
@keyframes bounce { 0%{transform:scale(1)} 35%{transform:scale(1.07)} 65%{transform:scale(0.97)} 100%{transform:scale(1)} }
.celebrate { animation: bounce 0.35s cubic-bezier(0.34,1.56,0.64,1); }

/* ══════════════════════════
   COUNTER
══════════════════════════ */
.counter-item {
  cursor: default;
  flex-direction: column;
  align-items: stretch;
  gap: 12px;
  padding: 14px 16px;
}

.counter-top {
  display: flex;
  align-items: center;
  gap: 14px;
}

.counter-body {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg2);
  border-radius: 12px;
  padding: 10px 14px;
}

.counter-display {
  flex: 1;
  text-align: center;
}

.counter-num {
  font-family: var(--serif);
  font-size: 40px;
  font-weight: 400;
  color: var(--t1);
  line-height: 1;
  font-variant-numeric: tabular-nums;
  letter-spacing: -1px;
}
.counter-item.checked .counter-num { color: var(--green); }

.counter-total {
  font-size: 11px;
  color: var(--t3);
  margin-top: 1px;
}

.counter-bar-track {
  height: 3px;
  background: var(--sep2);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 8px;
}
.counter-bar-fill {
  height: 100%;
  background: var(--green-grad);
  border-radius: 3px;
  transition: width 0.35s cubic-bezier(0.34,1.56,0.64,1);
  position: relative; overflow: hidden;
}
.counter-bar-fill::after {
  content: '';
  position: absolute;
  top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: barShimmer 2s ease-in-out infinite;
}

.btn-cnt {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: none;
  background: var(--green-grad);
  color: #000;
  font-size: 22px;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.1s, opacity 0.1s;
  flex-shrink: 0;
  box-shadow: 0 2px 14px rgba(52,217,98,0.35);
}
.btn-cnt:active { transform: scale(0.88); opacity: 0.85; }

.btn-cnt-reset {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1px solid var(--sep2);
  background: var(--card2);
  color: var(--t2);
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.btn-cnt-reset:active { background: var(--sep2); }

/* ══════════════════════════
   LINK ITEM
══════════════════════════ */
.link-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 13px 16px;
  text-decoration: none;
  background: rgba(255,214,10,0.06);
  border: 1px solid rgba(255,214,10,0.12);
  border-radius: var(--r);
  margin-bottom: 6px;
  transition: opacity 0.15s;
}
.link-item:active { opacity: 0.7; }
.link-icon-wrap {
  width: 34px; height: 34px;
  border-radius: 9px;
  background: rgba(255,214,10,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.link-label { font-size: 14px; font-weight: 500; color: var(--t1); }
.link-sub   { font-size: 11px; color: var(--t3); margin-top: 2px; }
.link-arrow { color: var(--t3); font-size: 14px; margin-left: auto; }

/* ══════════════════════════
   LOCKED SCREEN
══════════════════════════ */
.locked-screen {
  text-align: center;
  padding: 60px 24px;
}
.lock-ring {
  width: 72px; height: 72px;
  border-radius: 22px;
  background: var(--card);
  border: 1px solid var(--sep2);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
  font-size: 30px;
}
.lock-title { font-family: var(--serif); font-size: 22px; color: var(--t1); margin-bottom: 8px; }
.lock-sub { font-size: 13px; color: var(--t2); line-height: 1.6; max-width: 240px; margin: 0 auto; }

/* ══════════════════════════
   BOTTOM ACTION BAR
══════════════════════════ */
.action-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 12px 16px calc(12px + var(--safe-bot));
  background: var(--nav-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--sep);
  display: flex;
  gap: 10px;
  z-index: 90;
}

.btn-reset {
  padding: 14px 18px;
  border-radius: 14px;
  border: 1px solid var(--sep2);
  background: var(--card);
  color: var(--t2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.15s;
}
.btn-reset:active { background: var(--card2); }

.btn-bismillah {
  flex: 1;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: var(--green-grad);
  color: #000;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--serif);
  transition: all 0.15s;
  letter-spacing: 0.3px;
  box-shadow: 0 4px 20px rgba(52,217,98,0.35), 0 0 0 1px rgba(52,217,98,0.2);
}
.btn-bismillah:active { opacity: 0.85; transform: scale(0.98); box-shadow: 0 2px 10px rgba(52,217,98,0.2); }

/* ══════════════════════════
   NAV BAR
══════════════════════════ */
.nav-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--nav-bg);
  backdrop-filter: saturate(180%) blur(24px);
  -webkit-backdrop-filter: saturate(180%) blur(24px);
  border-top: 1px solid var(--sep);
  display: flex;
  padding: 6px 0 calc(6px + var(--safe-bot));
  z-index: 200;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 0;
  cursor: pointer;
  transition: all 0.2s;
}

.nav-icon-wrap {
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  color: var(--t3);
  transition: color 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.nav-item.active .nav-icon-wrap {
  color: var(--green);
  transform: translateY(-1px) scale(1.1);
}

.nav-label {
  font-size: 9px;
  font-weight: 600;
  color: var(--t3);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  transition: color 0.2s;
}
.nav-item.active .nav-label { color: var(--green); }

/* ══════════════════════════
   TOAST
══════════════════════════ */
.toast {
  position: fixed;
  bottom: 92px;
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: rgba(44,44,46,0.96);
  color: var(--t1);
  border: 1px solid var(--sep2);
  padding: 10px 18px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
  backdrop-filter: blur(16px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══════════════════════════
   BADGE POPUP
══════════════════════════ */
.badge-popup {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  padding: 24px;
}
.badge-popup.show { opacity: 1; pointer-events: all; }

.badge-popup-card {
  background: linear-gradient(145deg, rgba(22,22,36,0.97) 0%, rgba(14,14,24,0.99) 100%);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--r-xl);
  padding: 40px 28px 32px;
  text-align: center;
  max-width: 320px; width: 100%;
  transform: scale(0.7) translateY(20px);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  position: relative; overflow: hidden;
  box-shadow: 0 40px 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
}
.badge-popup.show .badge-popup-card { transform: scale(1) translateY(0); }
.badge-popup-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
}

@keyframes badgeSpin {
  0%   { transform: scale(0.2) rotate(-20deg); opacity: 0; }
  60%  { transform: scale(1.2) rotate(5deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); }
}
.popup-icon {
  width: 72px; height: 72px;
  border-radius: 22px;
  background: var(--green-soft);
  border: 1px solid rgba(48,209,88,0.2);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
}
.badge-popup.show .popup-icon { animation: badgeSpin 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.05s both; }

.popup-title { font-family: var(--serif); font-size: 24px; color: var(--t1); margin-bottom: 6px; }
.popup-sub   { font-size: 13px; color: var(--t2); margin-bottom: 28px; line-height: 1.55; }
.popup-btn {
  background: var(--green-grad); color: #000;
  border: none; border-radius: 14px;
  padding: 14px 36px;
  font-size: 15px; font-weight: 600;
  cursor: pointer; font-family: var(--serif);
  box-shadow: 0 4px 20px rgba(52,217,98,0.35);
}

/* ══════════════════════════
   LEVEL COMPLETE POPUP
══════════════════════════ */
.level-popup {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1001; opacity: 0; pointer-events: none;
  transition: opacity 0.35s;
  padding: 24px;
}
.level-popup.show { opacity: 1; pointer-events: all; }

.level-popup-card {
  background: linear-gradient(145deg, rgba(22,22,36,0.97) 0%, rgba(14,14,24,0.99) 100%);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--r-xl);
  padding: 44px 28px 32px;
  text-align: center;
  max-width: 320px; width: 100%;
  transform: scale(0.7) translateY(30px);
  transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
  position: relative; overflow: hidden;
  box-shadow: 0 40px 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
}
.level-popup.show .level-popup-card { transform: scale(1) translateY(0); }
.level-popup-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
}

.confetti-wrap { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.confetti-dot  { position: absolute; width: 6px; height: 6px; border-radius: 2px; opacity: 0; }
@keyframes confettiFall {
  0%   { opacity: 1; transform: translateY(-10px) rotate(0deg); }
  100% { opacity: 0; transform: translateY(220px) rotate(720deg); }
}

@keyframes starPop {
  0%   { transform: scale(0.2) rotate(-20deg); opacity: 0; }
  60%  { transform: scale(1.2) rotate(5deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); }
}
.lvl-stars { font-size: 52px; line-height: 1; margin-bottom: 18px; display: block; }
.level-popup.show .lvl-stars { animation: starPop 0.55s cubic-bezier(0.34,1.56,0.64,1) 0.1s both; }

.lvl-eyebrow { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--green); font-weight: 600; margin-bottom: 6px; opacity: 0.8; }
.lvl-title { font-family: var(--serif); font-size: 28px; color: var(--t1); margin-bottom: 8px; letter-spacing: -0.3px; }
.lvl-sub { font-size: 13px; color: var(--t2); line-height: 1.6; margin-bottom: 28px; }
.lvl-sub strong { color: var(--green); font-weight: 600; }

.btn-next-lvl {
  width: 100%; padding: 15px;
  border-radius: 14px; border: none;
  background: var(--green-grad); color: #000;
  font-size: 15px; font-weight: 600;
  cursor: pointer; font-family: var(--sans);
  box-shadow: 0 4px 20px rgba(52,217,98,0.35);
  transition: all 0.15s; margin-bottom: 10px;
}
.btn-next-lvl:active { opacity: 0.8; transform: scale(0.98); }

.btn-stay-lvl {
  width: 100%; padding: 12px;
  border-radius: 14px; border: 1px solid var(--sep2);
  background: transparent; color: var(--t2);
  font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: var(--sans);
  transition: all 0.15s;
}
.btn-stay-lvl:active { background: var(--card2); }

/* ══════════════════════════
   PROGRESSION PAGE
══════════════════════════ */
.prog-wrap { padding: 16px 16px 140px; }

.prog-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.prog-title { font-family: var(--serif); font-size: 28px; color: var(--t1); letter-spacing: -0.3px; }

.btn-share {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  border-radius: 20px;
  border: 1px solid var(--sep2);
  background: var(--card);
  color: var(--t2);
  font-size: 12px; font-weight: 500;
  cursor: pointer; font-family: var(--sans);
  transition: all 0.15s;
}
.btn-share:active { background: var(--card2); }

/* Streak card */
.streak-card {
  background: linear-gradient(145deg, rgba(28,28,42,0.92) 0%, rgba(18,18,30,0.97) 100%);
  border-radius: var(--r-xl);
  padding: 24px;
  margin-bottom: 10px;
  position: relative; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.07);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
}
.streak-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
}
.streak-inner {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 20px;
}
.streak-label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--t3); margin-bottom: 4px; }
.streak-num { font-family: var(--serif); font-size: 72px; font-weight: 400; line-height: 1; color: var(--t1); letter-spacing: -3px; font-variant-numeric: tabular-nums; }
.streak-unit { font-size: 14px; color: var(--t2); margin-top: 4px; }
.streak-flame { font-size: 52px; line-height: 1; filter: drop-shadow(0 0 16px rgba(255,149,0,0.5)); }

.medal-trio { display: flex; gap: 8px; margin-bottom: 16px; }
.medal-cell {
  flex: 1; border-radius: 12px; padding: 12px 8px; text-align: center;
  background: var(--bg2); border: 1px solid var(--sep); transition: all 0.3s;
}
.medal-cell.e-bronze { background: rgba(212,145,74,0.1); border-color: rgba(212,145,74,0.2); }
.medal-cell.e-silver { background: rgba(176,196,206,0.08); border-color: rgba(176,196,206,0.15); }
.medal-cell.e-gold   { background: var(--gold-soft); border-color: rgba(255,214,10,0.2); box-shadow: 0 0 12px var(--gold-glow); }
.medal-icon { font-size: 20px; line-height: 1; margin-bottom: 4px; }
.medal-name { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--t3); font-weight: 600; }
.medal-cell.e-bronze .medal-name { color: var(--bronze); }
.medal-cell.e-silver .medal-name { color: var(--silver); }
.medal-cell.e-gold   .medal-name { color: var(--gold); }
.medal-cond { font-size: 9px; color: var(--t3); margin-top: 2px; line-height: 1.3; }

.streak-footer { font-size: 12px; color: var(--t3); padding-top: 14px; border-top: 1px solid var(--sep); display: flex; gap: 16px; }
.streak-footer span { color: var(--t2); font-weight: 500; }

/* Stats row */
.stats-row { display: flex; gap: 8px; margin-bottom: 10px; }
.stat-box {
  flex: 1; background: var(--card); border-radius: var(--r-lg);
  padding: 16px 12px; text-align: center;
}
.stat-num { font-family: var(--serif); font-size: 30px; font-weight: 400; color: var(--t1); line-height: 1; letter-spacing: -1px; }
.stat-label { font-size: 9px; color: var(--t3); margin-top: 4px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

/* Section label */
.section-label { font-family: var(--serif); font-size: 20px; color: var(--t1); margin: 20px 0 10px 2px; letter-spacing: -0.2px; }

/* Week strip */
.week-strip { display: flex; gap: 5px; margin-bottom: 10px; }
.day-cell {
  flex: 1; aspect-ratio: 0.72;
  border-radius: 10px;
  border: 1px solid var(--sep);
  background: var(--card);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
}
.day-cell.d-bronze { background: rgba(212,145,74,0.15); border-color: rgba(212,145,74,0.2); }
.day-cell.d-silver { background: rgba(176,196,206,0.1); border-color: rgba(176,196,206,0.15); }
.day-cell.d-gold   { background: var(--gold-soft); border-color: rgba(255,214,10,0.2); }

// ── UTILS ──
function isFriday() { return new Date().getDay() === 5; }

// ── RAMADAN STATE ──
let ramadanState = JSON.parse(localStorage.getItem('spiritual_ramadan') || '{"active":false,"startDate":null,"days":{},"laylatul":{}}');

function saveRamadanState() { localStorage.setItem('spiritual_ramadan', JSON.stringify(ramadanState)); }

function toggleRamadanMode() {
  if (ramadanState.active) {
    if (!confirm('Désactiver le mode Ramadan ? Tes données de jeûne seront conservées.')) return;
    ramadanState.active = false;
    saveRamadanState();
    updateNavRamadan();
    renderRamadanActivateBtn();
    switchView('checklist');
    showToast('Mode Ramadan désactivé');
  } else {
    ramadanState.active = true;
    if (!ramadanState.startDate) ramadanState.startDate = TODAY;
    saveRamadanState();
    updateNavRamadan();
    renderRamadanActivateBtn();
    // Now switch to ramadan view directly
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('view-ramadan').classList.add('active');
    document.getElementById('nav-ramadan').classList.add('active');
    renderRamadan();
    showToast('🌙 Ramadan Mubarak ! Que ce mois soit béni.');
    if (navigator.vibrate) navigator.vibrate([30, 40, 60]);
  }
}

function updateNavRamadan() {
  const nav = document.getElementById('nav-ramadan');
  const icon = document.getElementById('navRamadanIcon');
  if (!nav) return;
  if (ramadanState.active) {
    nav.style.color = 'var(--moon)';
    icon.style.color = 'var(--moon)';
    // Add pulsing dot
    if (!document.getElementById('ramadanDot')) {
      const dot = document.createElement('div');
      dot.id = 'ramadanDot';
      dot.className = 'nav-ramadan-dot';
      nav.appendChild(dot);
    }
  } else {
    nav.style.color = '';
    icon.style.color = '';
    const dot = document.getElementById('ramadanDot');
    if (dot) dot.remove();
  }
}

function getRamadanDay() {
  if (!ramadanState.startDate) return 1;
  const start = new Date(ramadanState.startDate + 'T12:00:00');
  const today = new Date(TODAY + 'T12:00:00');
  const diff = Math.round((today - start) / 86400000) + 1;
  return Math.max(1, Math.min(30, diff));
}

function toggleFast(dayStr) {
  if (!ramadanState.days) ramadanState.days = {};
  ramadanState.days[dayStr] = !ramadanState.days[dayStr];
  if (ramadanState.days[dayStr]) {
    showToast('🌙 Jeûne du jour enregistré — Barakallahu feek !');
    if (navigator.vibrate) navigator.vibrate(25);
  }
  // Update history for badges
  if (!history.ramadan) history.ramadan = { totalFasts: 0, laylatul: {} };
  history.ramadan.totalFasts = Object.values(ramadanState.days).filter(Boolean).length;
  saveHistory();
  saveRamadanState();
  checkBadges();
  renderRamadan();
}

function toggleLaylatul(night) {
  if (!ramadanState.laylatul) ramadanState.laylatul = {};
  ramadanState.laylatul[night] = !ramadanState.laylatul[night];
  if (ramadanState.laylatul[night]) showToast('✨ Nuit ' + night + ' — Qu\'Allah l\'accepte !');
  if (!history.ramadan) history.ramadan = { totalFasts: 0, laylatul: {} };
  history.ramadan.laylatul = ramadanState.laylatul;
  saveHistory();
  saveRamadanState();
  checkBadges();
  renderRamadan();
}

function toggleRamadanItem(id) {
  const key = 'r_' + TODAY + '_' + id;
  ramadanState.days_items = ramadanState.days_items || {};
  ramadanState.days_items[key] = !ramadanState.days_items[key];
  saveRamadanState();
  renderRamadan();
  if (ramadanState.days_items[key] && navigator.vibrate) navigator.vibrate(20);
}

function getRamadanItemDone(id) {
  const key = 'r_' + TODAY + '_' + id;
  return !!(ramadanState.days_items && ramadanState.days_items[key]);
}

// ── RENDER RAMADAN ──
function renderRamadan() {
  const el = document.getElementById('ramadanContent');
  if (!el) return;

  const day = getRamadanDay();
  const daysLeft = Math.max(0, 30 - day + 1);
  const todayFasted = ramadanState.days && ramadanState.days[TODAY];
  const totalFasts = Object.values(ramadanState.days || {}).filter(Boolean).length;
  const isLast10 = day >= 21;

  // Progress bar
  const pct = Math.round((day - 1) / 30 * 100);
  const f4 = document.getElementById('globalFill4');
  if (f4) f4.style.width = pct + '%';

  // ── Hero banner
  let html = '<div class="ramadan-banner">';
  html += '<span class="ramadan-moon">🌙</span>';
  html += '<div class="ramadan-title">رَمَضَان كَرِيم</div>';
  html += '<div class="ramadan-arabic">شَهْرُ رَمَضَانَ</div>';
  html += '<div class="ramadan-day-row">';
  html += '<div class="ramadan-day-box"><div class="ramadan-day-num">' + day + '</div><div class="ramadan-day-label">Jour</div></div>';
  html += '<div style="color:var(--t3);font-size:20px;">·</div>';
  html += '<div class="ramadan-day-box"><div class="ramadan-day-num">' + daysLeft + '</div><div class="ramadan-day-label">Restants</div></div>';
  html += '</div></div>';

  // ── Stats jeûne
  html += '<div class="fast-streak-row">';
  html += '<div class="fast-stat active"><div class="fast-stat-num">' + totalFasts + '</div><div class="fast-stat-label">Jours jeûnés</div></div>';
  html += '<div class="fast-stat"><div class="fast-stat-num">' + (30 - totalFasts) + '</div><div class="fast-stat-label">Restants</div></div>';
  html += '<div class="fast-stat"><div class="fast-stat-num">' + Math.round(totalFasts / 30 * 100) + '%</div><div class="fast-stat-label">Progression</div></div>';
  html += '</div>';

  // ── Jeûne du jour
  html += '<div style="background:var(--card);border-radius:var(--r-xl);overflow:hidden;margin-bottom:8px;">';
  html += '<div style="padding:14px 16px;border-bottom:1px solid var(--sep);">';
  html += '<div style="font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:2px;">Aujourd\'hui</div>';
  html += '<div style="font-family:var(--serif);font-size:18px;color:var(--t1);">Jeûne du jour</div>';
  html += '</div>';

  const fastItems = [
    { id: 'fast', label: "J'ai jeûné aujourd'hui", arabic: 'صُمْتُ الْيَوْمَ', isFast: true, special: true },
    { id: 'suhur', label: 'Suhur — repas avant l\'aube', arabic: 'السَّحُور' },
    { id: 'iftar', label: 'Iftar — rupture du jeûne', arabic: 'الْإِفْطَار', sub: 'بِسْمِ اللَّهِ وَعَلَى بَرَكَةِ اللَّهِ' },
    { id: 'tarawih', label: 'Prière Tarawih', arabic: 'صَلَاةُ التَّرَاوِيحِ', sub: '8 ou 20 rakaat après Isha' },
    { id: 'quran_ramadan', label: 'Récitation du Coran', arabic: 'قِرَاءَةُ الْقُرْآنِ', sub: 'Objectif : 1 Juzz par jour' },
    { id: 'sadaqa_ramadan', label: 'Sadaqa du jour', arabic: 'الصَّدَقَةُ', sub: 'Même un sourire ou un service' },
  ];

  fastItems.forEach((item, idx) => {
    const done = item.special ? !!todayFasted : getRamadanItemDone(item.id);
    const onclick = item.special ? 'toggleFast(\'' + TODAY + '\')' : 'toggleRamadanItem(\'' + item.id + '\')';
    const fastCls = (item.isFast || item.special) ? ' fast-item' : '';
    const arabicHtml = item.arabic ? '<div class="item-arabic">' + item.arabic + '</div>' : '';
    const subHtml = item.sub ? '<div class="item-sub">' + item.sub + '</div>' : '';
    html += '<div class="item' + fastCls + (done ? ' checked' : '') + '" onclick="' + onclick + '" id="ritem-' + item.id + '">';
    html += '<div class="check-circle' + (item.special ? '" style="' + (done ? 'background:var(--moon);border-color:var(--moon);box-shadow:0 0 0 4px var(--moon-soft)' : 'border-color:rgba(245,166,35,0.4)') : '') + '">';
    html += '<svg class="check-svg" style="' + (done ? 'opacity:1;transform:scale(1)' : '') + '" width="11" height="9" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    html += '</div>';
    html += '<div class="item-body"><div class="item-label">' + item.label + '</div>' + subHtml + arabicHtml + '</div>';
    html += '</div>';
  });
  html += '</div>';

  // ── Horaires
  html += '<div style="margin-bottom:4px;padding:0 2px;"><div style="font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:8px;">Horaires Imsak / Iftar</div>';
  // City selector
  html += '<div style="display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:8px;padding-bottom:2px;">';
  HORAIRES_CITIES.forEach(c => {
    const active = c.name === selectedCity;
    html += '<div onclick="selectCity(\'' + c.name + '\')" style="flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;border:1px solid ' + (active ? 'var(--moon)' : 'var(--sep)') + ';background:' + (active ? 'rgba(245,166,35,0.1)' : 'var(--card)') + ';color:' + (active ? 'var(--moon)' : 'var(--t2)') + ';">' + c.name + '</div>';
  });
  html += '</div>';
  html += '<div class="horaires-link" onclick="openHoraires()">';
  html += '<div class="horaires-icon">🕌</div>';
  html += '<div class="horaires-body"><div class="horaires-label">Voir les horaires — ' + selectedCity + '</div><div class="horaires-sub">Source officielle · Mosquée / IslamicCalendar.fr</div></div>';
  html += '<div class="horaires-arrow">›</div>';
  html += '</div></div>';

  // ── Calendrier des jeûnes
  html += '<div style="background:var(--card);border-radius:var(--r-xl);padding:18px;margin-bottom:8px;">';
  html += '<div style="font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:12px;">Calendrier du jeûne</div>';
  html += '<div class="fast-calendar">';
  for (let d = 1; d <= 30; d++) {
    const startObj = new Date((ramadanState.startDate || TODAY) + 'T12:00:00');
    startObj.setDate(startObj.getDate() + d - 1);
    const dStr = startObj.toISOString().split('T')[0];
    const fasted = ramadanState.days && ramadanState.days[dStr];
    const isToday = dStr === TODAY;
    const isFuture = dStr > TODAY;
    let cls = 'fast-day';
    if (fasted) cls += ' fasted';
    if (isToday) cls += ' today';
    if (isFuture && !isToday) cls += ' future';
    const onclick = (!isFuture || isToday) ? ' onclick="toggleFast(\'' + dStr + '\')"' : '';
    html += '<div class="' + cls + '"' + onclick + '>' + d + '</div>';
  }
  html += '</div></div>';

  // ── Laylat al-Qadr (visible toujours, activé surtout dernière décade)
  html += '<div class="laylatul-card">';
  html += '<div class="laylatul-stars">✨🌙✨</div>';
  html += '<div class="laylatul-title">Laylat al-Qadr</div>';
  html += '<div class="laylatul-arabic">لَيْلَةُ الْقَدْرِ</div>';
  html += '<div class="laylatul-sub">Les 5 nuits impaires des 10 dernières nuits — meilleure que mille mois</div>';
  html += '<div class="laylatul-nights">';
  [21, 23, 25, 27, 29].forEach(n => {
    const done = ramadanState.laylatul && ramadanState.laylatul[n];
    const startObj2 = new Date((ramadanState.startDate || TODAY) + 'T12:00:00');
    startObj2.setDate(startObj2.getDate() + n - 1);
    const nStr = startObj2.toISOString().split('T')[0];
    const isActive = TODAY >= nStr;
    let cls = 'laylatul-night';
    if (done) cls += ' done';
    else if (isActive) cls += ' active';
    html += '<div class="' + cls + '" onclick="toggleLaylatul(' + n + ')">';
    html += '<div class="night-num">' + n + '</div>';
    html += '<div class="night-label">Nuit</div>';
    html += '</div>';
  });
  html += '</div></div>';

  el.innerHTML = html;
}

// ── STATE ──
const TODAY = new Date().toISOString().split('T')[0];
let state   = JSON.parse(localStorage.getItem('spiritual_v2') || '{}');
let history = JSON.parse(localStorage.getItem('spiritual_history') || '{"days":{},"dayMedals":{},"streak":0,"bestStreak":0,"totalDays":0,"unlockedBadges":[],"weekDays":0,"jumuahCount":0}');
let currentLevel = parseInt(localStorage.getItem('spiritual_level') || '1');
if (history.jumuahCount === undefined) history.jumuahCount = 0;

if (state._date !== TODAY) {
  checkAndSaveYesterdayStreak();
  const ul = state._unlocked || [1];
  state = { _date: TODAY, _unlocked: ul };
  saveState();
}
if (!state._unlocked) state._unlocked = [1];

function getCalcLvlPct(lvlId, s) {
  const lvl = LEVELS.find(l => l.id === lvlId);
  const items = lvl.sections.flatMap(sec => sec.items);
  const done = items.filter(i => i.type === 'counter' ? (s[i.id]||0) >= i.target : !!s[i.id]).length;
  return items.length > 0 ? (done / items.length) * 100 : 0;
}

function checkAndSaveYesterdayStreak() {
  const prevDate = state._date;
  if (!prevDate) return;
  const lvl1Pct = getCalcLvlPct(1, state);
  if (lvl1Pct >= 100) {
    const lvl2Pct = getCalcLvlPct(2, state);
    const allComplete = LEVELS.every(l => getCalcLvlPct(l.id, state) >= 100);
    let dayMedal = 'bronze';
    if (allComplete && history.streak >= 2) dayMedal = 'gold';
    else if (lvl2Pct >= 100) dayMedal = 'silver';
    history.days[prevDate] = true;
    if (!history.dayMedals) history.dayMedals = {};
    history.dayMedals[prevDate] = dayMedal;
    // Robust streak: check if prevDate is exactly yesterday relative to TODAY
    const todayDate = new Date(TODAY + 'T12:00:00');
    const prevDateObj = new Date(prevDate + 'T12:00:00');
    const diffDays = Math.round((todayDate - prevDateObj) / 86400000);
    if (diffDays === 1) {
      // consecutive day
      history.streak = (history.streak || 0) + 1;
    } else if (diffDays > 1) {
      // gap — reset streak
      history.streak = 1;
    }
    // diffDays === 0 means same day open, don't change streak
    history.bestStreak = Math.max(history.bestStreak || 0, history.streak);
    history.totalDays = (history.totalDays || 0) + 1;
  } else {
    const todayDate = new Date(TODAY + 'T12:00:00');
    const prevDateObj = new Date((prevDate || TODAY) + 'T12:00:00');
    const diffDays = Math.round((todayDate - prevDateObj) / 86400000);
    if (diffDays >= 1) history.streak = 0;
  }
  history.weekDays = 0;
  for (let i = 0; i < 7; i++) if (history.days[getDateMinus(TODAY, i+1)]) history.weekDays++;
  saveHistory();
}

function getDateMinus(dateStr, days) {
  const d = new Date(dateStr); d.setDate(d.getDate() - days); return d.toISOString().split('T')[0];
}
function saveState()   { localStorage.setItem('spiritual_v2', JSON.stringify(state)); localStorage.setItem('spiritual_level', currentLevel); }
function saveHistory() { localStorage.setItem('spiritual_history', JSON.stringify(history)); }

// ── BADGES ──
function checkBadges() {
  let newBadge = null;
  BADGES.forEach(badge => {
    if (!history.unlockedBadges.includes(badge.id) && badge.check(state, history)) {
      history.unlockedBadges.push(badge.id);
      newBadge = badge;
    }
  });
  saveHistory();
  if (newBadge) { playCheckSound(); showBadgePopup(newBadge); }
}

// ── MEDALS ──
function getLevelProgress(levelId) { return getCalcLvlPct(levelId, state); }

function getMedalLevel() {
  const lvl1 = getLevelProgress(1);
  const lvl2 = getLevelProgress(2);
  const streakCurrent = history.streak + (lvl1 >= 100 ? 1 : 0);
  const allDone = LEVELS.every(l => getLevelProgress(l.id) >= 100);
  if (allDone && streakCurrent >= 3) return 'gold';
  if (lvl1 >= 100 && lvl2 >= 100) return 'silver';
  if (lvl1 >= 100) return 'bronze';
  return 'none';
}

// ── PROGRESS ──
function getLevelItems(levelId) {
  const level = LEVELS.find(l => l.id === levelId);
  return level ? level.sections.flatMap(s => s.items) : [];
}
function updateGlobalProgress() {
  const allItems = LEVELS.flatMap(l => getLevelItems(l.id));
  const done = allItems.filter(item => item.type === 'counter' ? (state[item.id]||0) >= item.target : !!state[item.id]).length;
  const pct  = allItems.length > 0 ? (done / allItems.length) * 100 : 0;
  const f1 = document.getElementById('globalFill');
  const f2 = document.getElementById('globalFill2');
  if (f1) f1.style.width = pct + '%';
  if (f2) f2.style.width = pct + '%';
  updateMedal();
}

// ── LEVEL COMPLETION ──
function checkLevelCompletion(levelId) {
  if (getLevelProgress(levelId) >= 100) {
    const nextId = levelId + 1;
    const hasNext = nextId <= LEVELS.length;
    const alreadyShown = state['_lvl_shown_' + levelId];
    if (!alreadyShown) {
      state['_lvl_shown_' + levelId] = true;
      if (hasNext && !state._unlocked.includes(nextId)) state._unlocked.push(nextId);
      saveState();
      renderTabs();
      showLevelPopup(levelId, nextId, hasNext);
    }
  }
}

// ── TABS ──
function renderTabs() {
  const tabs = document.getElementById('levelTabs');
  tabs.innerHTML = LEVELS.map(l => {
    const unlocked = state._unlocked.includes(l.id);
    const active   = l.id === currentLevel;
    const pct      = getLevelProgress(l.id);
    const done     = pct >= 100;
    let cls = 'tab';
    if (active)        cls += ' active';
    else if (!unlocked) cls += ' locked';
    else if (done)     cls += ' done';
    const lock = !unlocked ? ' 🔒' : done ? ' ✓' : '';
    return '<div class="' + cls + '" onclick="selectLevel(' + l.id + ')">' + l.title + lock + '</div>';
  }).join('');
}

function selectLevel(id) {
  if (id > 1 && !state._unlocked.includes(id)) {
    showToast('Termine le niveau ' + (id-1) + ' a 100% pour debloquer 🔒');
    return;
  }
  currentLevel = id;
  saveState();
  renderTabs();
  renderLevel(id);
}

// ── RENDER LEVEL ──
function renderLevel(levelId) {
  const level   = LEVELS.find(l => l.id === levelId);
  const content = document.getElementById('content');
  const pct     = getLevelProgress(levelId);

  if (!state._unlocked.includes(levelId)) {
    content.innerHTML = '<div class="locked-screen"><div class="lock-ring">🔒</div><div class="lock-title">Niveau ' + levelId + ' verrouille</div><div class="lock-sub">Complete le Niveau ' + (levelId-1) + ' pour debloquer ce niveau.</div></div>';
    return;
  }

  const fridayBanner = (level.id === 1 && isFriday()) ? '<div class="friday-banner"><div style="font-size:22px">🌟</div><div class="friday-txt"><div class="friday-title">Yawm al-Jumuah — Vendredi beni</div><div class="friday-sub">La priere du vendredi est obligatoire aujourd\'hui</div></div></div>' : '';

  let html = '<div class="level-hero"><div class="hero-label">Niveau ' + level.id + '</div><div class="hero-title">' + level.title + '</div><div class="hero-bar-row"><div class="hero-bar-track"><div class="hero-bar-fill" style="width:' + pct + '%"></div></div><div class="hero-pct">' + Math.round(pct) + '%</div></div></div>' + fridayBanner;

  level.sections.forEach(section => {
    html += '<div class="section"><div class="section-title-row"><div class="section-icon-wrap">' + section.icon + '</div><div class="section-name">' + section.title + '</div></div>';

    html += '<div class="items-group">';
    section.items.forEach((item, idx) => {
      const delay = idx * 30;
      if (item.type === 'counter') {
        html += renderCounter(item, delay);
      } else {
        const checked = !!state[item.id];
        const fridayCls = item.isFriday ? ' friday-item' : '';
        const arabicHtml = item.arabic ? '<div class="item-arabic">' + item.arabic + '</div>' : '';
        html += '<div class="item' + fridayCls + (checked ? ' checked' : '') + '" onclick="toggleItem(\'' + item.id + '\',event)" style="animation-delay:' + delay + 'ms;--i:' + idx + '" id="item-' + item.id + '"><div class="check-circle"><svg class="check-svg" width="11" height="9" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="item-body"><div class="item-label">' + item.label + '</div>' + (item.sub ? '<div class="item-sub">' + item.sub + '</div>' : '') + arabicHtml + '</div></div>';
      }
    });
    html += '</div>';

    if (section.links) {
      section.links.forEach(link => {
        html += '<a class="link-item" href="' + link.url + '" target="_blank" rel="noopener"><div class="link-icon-wrap">' + link.icon + '</div><div><div class="link-label">' + link.label + '</div><div class="link-sub">' + link.sub + '</div></div><div class="link-arrow">›</div></a>';
      });
    }
    html += '</div>';
  });

  content.innerHTML = html;
  level.sections.forEach(s => s.items.forEach(item => { if (item.type === 'counter') initCounterEl(item); }));
}

// ── COUNTER ──
function renderCounter(item, delay) {
  const count = state[item.id] || 0;
  const done  = count >= item.target;
  const arabicHtml = item.arabic ? '<div class="item-arabic" style="' + (done ? 'opacity:0.25' : '') + '">' + item.arabic + '</div>' : '';
  return '<div class="item counter-item' + (done ? ' checked' : '') + '" style="animation-delay:' + delay + 'ms" id="item-' + item.id + '"><div class="counter-top"><div class="check-circle" id="cb-' + item.id + '" style="' + (done ? 'background:var(--green);border-color:var(--green);box-shadow:0 0 0 4px var(--green-soft)' : '') + '"><svg class="check-svg" style="' + (done ? 'opacity:1;transform:scale(1)' : '') + '" width="11" height="9" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="item-body"><div class="item-label">' + item.label + '</div><div class="item-sub">' + item.sub + '</div>' + arabicHtml + '</div></div><div class="counter-body"><button class="btn-cnt-reset" onclick="resetCounter(\'' + item.id + '\')">↺</button><div class="counter-display"><div class="counter-num" id="cnt-num-' + item.id + '">' + count + '</div><div class="counter-total">/ ' + item.target + '</div><div class="counter-bar-track"><div class="counter-bar-fill" id="cnt-bar-' + item.id + '" style="width:' + Math.min(count/item.target*100,100) + '%"></div></div></div><button class="btn-cnt" onclick="incrementCounter(\'' + item.id + '\',' + item.target + ')">+</button></div></div>';
}

function initCounterEl(item) {}

function incrementCounter(id, target) {
  const count = (state[id] || 0) + 1;
  if (count > target) return;
  state[id] = count;
  saveState();
  const numEl  = document.getElementById('cnt-num-' + id);
  const barEl  = document.getElementById('cnt-bar-' + id);
  const itemEl = document.getElementById('item-' + id);
  const cbEl   = document.getElementById('cb-' + id);
  if (numEl) numEl.textContent = count;
  if (barEl) barEl.style.width = Math.min(count/target*100,100) + '%';
  playCounterSound();
  if (count >= target) {
    itemEl && itemEl.classList.add('checked');
    if (cbEl) {
      cbEl.style.background = 'var(--green-grad)'; cbEl.style.borderColor = 'var(--green)';
      cbEl.style.boxShadow = '0 0 0 4px var(--green-soft), 0 0 16px rgba(52,217,98,0.25)';
      const svg = cbEl.querySelector('.check-svg');
      if (svg) { svg.style.opacity = '1'; svg.style.transform = 'scale(1)'; }
    }
    itemEl && itemEl.classList.add('celebrate');
    setTimeout(() => itemEl && itemEl.classList.remove('celebrate'), 400);
    if (navigator.vibrate) navigator.vibrate([20, 40, 80]);
    playCompleteSound();
    showToast('🌿 Mashallah ! ' + target + ' fois accompli !');
    checkLevelCompletion(currentLevel);
  } else {
    if (navigator.vibrate) navigator.vibrate(8);
  }
  updateGlobalProgress();
  renderTabs();
  checkBadges();
}

function resetCounter(id) {
  state[id] = 0; saveState();
  renderLevel(currentLevel); updateGlobalProgress();
}

// ── SOUND (Web Audio API) ──
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return _audioCtx;
}
function playCheckSound() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(520, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(780, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.13, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.22);
  } catch(e) {}
}
function playCounterSound() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(440, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(560, ctx.currentTime + 0.06);
    gain.gain.setValueAtTime(0.09, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.14);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.14);
  } catch(e) {}
}
function playCompleteSound() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  try {
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      const t = ctx.currentTime + i * 0.09;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc.start(t); osc.stop(t + 0.25);
    });
  } catch(e) {}
}

// ── RIPPLE ──
function spawnRipple(el, event) {
  const rect = el.getBoundingClientRect();
  const x = (event.touches ? event.touches[0].clientX : event.clientX) - rect.left;
  const y = (event.touches ? event.touches[0].clientY : event.clientY) - rect.top;
  const size = Math.max(rect.width, rect.height) * 0.8;
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + (x - size/2) + 'px;top:' + (y - size/2) + 'px;';
  el.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove(), { once: true });
}
// ── TOGGLE ──
function toggleItem(id, event) {
  state[id] = !state[id];
  saveState();
  const el = document.getElementById('item-' + id);
  if (el) {
    if (event) spawnRipple(el, event);
    el.classList.toggle('checked', !!state[id]);
    if (state[id]) {
      el.classList.add('celebrate');
      setTimeout(() => el.classList.remove('celebrate'), 400);
      if (navigator.vibrate) navigator.vibrate([12, 8, 25]);
      playCheckSound();
      if (id === 'jumua') {
        if (!history.jumuahDays) history.jumuahDays = {};
        if (!history.jumuahDays[TODAY]) {
          history.jumuahDays[TODAY] = true;
          history.jumuahCount = (history.jumuahCount || 0) + 1;
          saveHistory();
          showToast('🕌 Jumuah accomplie — Barakallahu feek !');
        }
      }
    }
  }
  checkLevelCompletion(currentLevel);
  updateGlobalProgress();
  renderTabs();
  checkBadges();
}

// ── RESET ──
function confirmReset() {
  if (confirm('Remettre a zero toutes les cases du jour ?')) {
    const ul = state._unlocked;
    state = { _date: TODAY, _unlocked: ul };
    saveState();
    renderLevel(currentLevel); updateGlobalProgress(); renderTabs();
    showToast('Nouvelle journee — Bismillah 🌿');
  }
}

// ── TOAST ──
let toastTimeout;
function showToast(msg) {
  if (!msg) return;
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 2600);
}

// ── SHARE ──
function shareStreak() {
  const streakDone = history.streak + (getLevelProgress(1) >= 100 ? 1 : 0);
  const medal = getMedalLevel();
  const medalLabel = { none: '', bronze: '🥉', silver: '🥈', gold: '🥇' }[medal] || '';
  const text = medalLabel + ' Jour ' + streakDone + ' de pratique spirituelle avec Niyyah — Alhamdulillah ! 🌿';
  if (navigator.share) navigator.share({ title: 'Niyyah', text });
  else navigator.clipboard && navigator.clipboard.writeText(text).then(() => showToast('Copie dans le presse-papier !'));
}

// ── YEAR CALENDAR ──
let calYear = new Date().getFullYear();

function renderYearCalendar() {
  const el = document.getElementById('yearCalContent');
  if (!el) return;
  const todayDone = getLevelProgress(1) >= 100;
  const currentMedal = getMedalLevel();
  const MONTHS = ['Jan','Fev','Mar','Avr','Mai','Jun','Jul','Aou','Sep','Oct','Nov','Dec'];
  const nowYear = new Date().getFullYear();
  const canNext = calYear < nowYear;

  let html = '<div class="year-nav"><button class="year-nav-btn" onclick="calYear--;renderYearCalendar()">&#8249;</button><div class="year-nav-title">' + calYear + '</div><button class="year-nav-btn" style="opacity:' + (canNext ? '1' : '0.3') + '" onclick="' + (canNext ? 'calYear++;renderYearCalendar()' : '') + '">&#8250;</button></div><div class="year-months">';

  for (let m = 0; m < 12; m++) {
    const daysInMonth = new Date(calYear, m+1, 0).getDate();
    html += '<div class="year-month"><div class="year-month-label">' + MONTHS[m] + '</div><div class="year-days">';
    for (let d = 1; d <= daysInMonth; d++) {
      const dStr = calYear + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      const isToday  = dStr === TODAY;
      const isFuture = dStr > TODAY;
      let medal = null;
      if (isToday && todayDone) medal = currentMedal;
      else if (!isFuture && !isToday) medal = ((history.dayMedals && history.dayMedals[dStr])) || ((history.days && history.days[dStr]) ? 'bronze' : null);
      const medalCls = { bronze: 'yb', silver: 'ys', gold: 'yg' };
      let cls = 'year-day';
      if (isFuture) cls += ' fy';
      else if (medal) cls += ' ' + (medalCls[medal] || 'yb');
      if (isToday) cls += ' yt';
      html += '<div class="' + cls + '"></div>';
    }
    html += '</div></div>';
  }
  html += '</div><div class="year-legend"><div class="yl-item"><div class="yl-dot" style="background:var(--card2)"></div>Aucune</div><div class="yl-item"><div class="yl-dot" style="background:#d4914a"></div>Bronze</div><div class="yl-item"><div class="yl-dot" style="background:#b0c4ce"></div>Argent</div><div class="yl-item"><div class="yl-dot" style="background:var(--gold)"></div>Or</div></div>';
  el.innerHTML = html;
}

// ── PROGRESSION ──
function renderProgression() {
  const el = document.getElementById('progContent');
  const todayDone = getLevelProgress(1) >= 100;
  const streakDisplay = history.streak + (todayDone ? 1 : 0);
  const bestDisplay   = Math.max(history.bestStreak, streakDisplay);
  const totalDisplay  = history.totalDays + (todayDone ? 1 : 0);
  const currentMedal  = getMedalLevel();

  // Flame
  const flame = streakDisplay >= 7 ? '🔥' : streakDisplay >= 3 ? '🕯️' : '✦';

  // Medal trio
  const MEDALS = [
    { key: 'bronze', name: 'Bronze', icon: '🥉', cond: 'Niv. 1 complet' },
    { key: 'silver', name: 'Argent', icon: '🥈', cond: 'Niv. 1 + 2' },
    { key: 'gold',   name: 'Or',     icon: '🥇', cond: 'Tout + streak 3j' },
  ];
  const mOrder = ['none','bronze','silver','gold'];
  const medalTrio = MEDALS.map(m => {
    const earned = mOrder.indexOf(currentMedal) >= mOrder.indexOf(m.key);
    return '<div class="medal-cell' + (earned ? ' e-' + m.key : '') + '"><div class="medal-icon">' + m.icon + '</div><div class="medal-name">' + m.name + '</div><div class="medal-cond">' + m.cond + '</div></div>';
  }).join('');

  // Week strip
  const DAY_NAMES = ['Di','Lu','Ma','Me','Je','Ve','Sa'];
  const today = new Date();
  let weekHTML = '';
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const dStr    = d.toISOString().split('T')[0];
    const isToday = dStr === TODAY;
    const medal   = isToday ? (todayDone ? currentMedal : null) : ((history.dayMedals && history.dayMedals[dStr]) || (history.days[dStr] ? 'bronze' : null));
    const isDone  = !!medal;
    const dotMap  = { bronze: '🥉', silver: '🥈', gold: '🥇' };
    let cls = 'day-cell';
    if (isDone)  cls += ' d-' + medal;
    if (isToday) cls += ' d-today';
    weekHTML += '<div class="' + cls + '"><div class="d-name">' + DAY_NAMES[d.getDay()] + '</div><div class="d-dot">' + (isDone ? (dotMap[medal]||'✓') : (isToday ? '◎' : '')) + '</div><div class="d-num">' + d.getDate() + '</div></div>';
  }

  // Badges
  let badgesHTML = '';
  BADGES.forEach(badge => {
    const unlocked = history.unlockedBadges.includes(badge.id);
    let cls = 'badge-card';
    if (unlocked) { cls += ' unlocked'; if (badge.gold) cls += ' is-gold'; }
    else cls += ' locked';
    badgesHTML += '<div class="' + cls + '"><div class="badge-icon-wrap">' + badge.emoji + '</div><div class="badge-name">' + badge.name + '</div><div class="badge-desc">' + badge.desc + '</div>' + (unlocked ? '<div class="badge-tag">' + (badge.gold ? '★ Or' : '✓ Obtenu') + '</div>' : '') + '</div>';
  });

  el.innerHTML = '<div class="streak-card"><div class="streak-inner"><div><div class="streak-label">Serie en cours</div><div class="streak-num">' + streakDisplay + '</div><div class="streak-unit">jours consecutifs</div></div><div class="streak-flame">' + flame + '</div></div><div class="medal-trio">' + medalTrio + '</div><div class="streak-footer">Meilleure : <span>' + bestDisplay + 'j</span> &nbsp;·&nbsp; Total : <span>' + totalDisplay + ' jours</span></div></div><div class="stats-row"><div class="stat-box"><div class="stat-num">' + history.unlockedBadges.length + '</div><div class="stat-label">Badges</div></div><div class="stat-box"><div class="stat-num">' + BADGES.length + '</div><div class="stat-label">Total</div></div><div class="stat-box"><div class="stat-num">' + Math.round((history.unlockedBadges.length/BADGES.length)*100) + '%</div><div class="stat-label">Completion</div></div></div><div class="section-label">Cette semaine</div><div class="week-strip">' + weekHTML + '</div><div class="section-label">Cette annee</div><div class="year-card" id="yearCalContent"></div><div class="section-label">Badges</div><div class="badges-grid">' + badgesHTML + '</div>';

  renderYearCalendar();
}

// ── THEME ──
let currentTheme = localStorage.getItem('spiritual_theme') || 'dark';

function applyTheme(theme) {
  currentTheme = theme;
  document.documentElement.setAttribute('data-theme', theme === 'light' ? 'light' : '');
  const btn = document.getElementById('btnTheme');
  if (btn) btn.textContent = theme === 'light' ? '🌙' : '☀️';
  localStorage.setItem('spiritual_theme', theme);
}

function toggleTheme() {
  const next = currentTheme === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  const msg = next === 'light' ? '☀️ Thème clair activé' : '🌙 Thème sombre activé';
  showToast(msg);
  if (navigator.vibrate) navigator.vibrate(18);
}

init();
</script>
